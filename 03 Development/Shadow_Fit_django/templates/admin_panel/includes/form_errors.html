{% if form.errors %}
    {% for field in form %}
        {% if field.errors %}
            <div class="admin-alert admin-alert-error">
                <strong>{{ field.label }}:</strong>
                {% for error in field.errors %}
                    {{ error }}
                {% endfor %}
            </div>
        {% endif %}
    {% endfor %}
    {% if form.non_field_errors %}
        <div class="admin-alert admin-alert-error">
            {% for error in form.non_field_errors %}
                {{ error }}
            {% endfor %}
        </div>
    {% endif %}
{% endif %}
