{% extends "admin_panel/base_admin.html" %}
{% block title %}Add Client{% endblock %}
{% block page_title %}Add Client{% endblock %}
{% block breadcrumb %}Clients / Add{% endblock %}

{% block content %}
<div class="admin-form-card">
    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}

        <div class="row">
            <div class="col-md-6">
                <label>First Name</label>
                <input type="text" name="first_name" value="{{ form.first_name.value|default:'' }}" required>
            </div>
            <div class="col-md-6">
                <label>Last Name</label>
                <input type="text" name="last_name" value="{{ form.last_name.value|default:'' }}" required>
            </div>
        </div>

        <label>Username</label>
        <input type="text" name="username" value="{{ form.username.value|default:'' }}" required>

        <label>Email</label>
        <input type="email" name="email" value="{{ form.email.value|default:'' }}" required>

        <label>Phone</label>
        <input type="text" name="phone" value="{{ form.phone.value|default:'' }}">

        <label>Profile Photo</label>
        <input type="file" name="photo" accept="image/*">

        <div class="mt-2" style="font-size:13px; color:#888;">
            <i class="bi bi-info-circle"></i>
            Default password will be set to: <strong id="default-password">@123</strong>
        </div>

        <div class="d-flex gap-2 mt-4">
            <button type="submit" class="btn-admin-success">
                <i class="bi bi-check-lg"></i> Add Client
            </button>
            <a href="{% url 'client_list' %}" class="btn-admin-primary">
                <i class="bi bi-x-lg"></i> Cancel
            </a>
        </div>
    </form>
</div>

<script>
    const usernameInput = document.querySelector('input[name="username"]');
    const defaultPassword = document.getElementById('default-password');

    usernameInput.addEventListener('input', function () {
        defaultPassword.textContent = (this.value || '') + '@123';
    });
</script>
{% endblock %}
