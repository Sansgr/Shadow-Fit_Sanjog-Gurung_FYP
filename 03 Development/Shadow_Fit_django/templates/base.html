{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Shadow Fit</title>
    <!-- External CSS -->
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&family=Poppins:wght@300;400;500;600&display=swap"
        rel="stylesheet">
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" href="{% url 'dashboard' %}">
                <span class="logo-shadow">Shadow</span>
                <span class="logo-fit">Fit</span>
            </a>
            <div class="ms-auto d-flex align-items-center">
                {% if request.user.is_authenticated %}
                <a href="{% url 'dashboard' %}" class="btn btn-outline-light me-2">Dashboard</a>
                <a href="{% url 'logout' %}" class="btn-green">Logout</a>
                {% else %}
                <a href="{% url 'login' %}" class="btn btn-outline-light me-2">Login</a>
                <a href="{% url 'register' %}" class="btn-green">Register</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <!-- MAIN PAGE CONTENT -->
    <div class="page-container">
        {% block content %}
        {% endblock %}
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
