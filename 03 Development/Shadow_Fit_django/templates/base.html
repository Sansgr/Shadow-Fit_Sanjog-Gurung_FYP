{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Shadow Fit</title>

    <!-- External CSS -->
    <link rel="stylesheet" href="{% static 'css/style.css' %}">

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Internal CSS -->
    <style>
        body{
            background: linear-gradient(135deg,#0f0f0f,#1b1b1b);
            font-family: 'Poppins', sans-serif;
            height:100vh;
            display:flex;
            align-items:center;
            justify-content:center;
        }

        .auth-container{
            background:white;
            padding:45px;
            width:420px;
            border-radius:12px;
            box-shadow:0 10px 40px rgba(0,0,0,0.4);
        }

        .logo{
            text-align:center;
            font-family:'Montserrat',sans-serif;
            font-size:32px;
            font-weight:700;
            margin-bottom:8px;
        }

        .logo-shadow{
            color:black;
        }

        .logo-fit{
            color:#20c05c;
        }

        .tagline{
            text-align:center;
            color:#777;
            font-size:14px;
            margin-bottom:25px;
        }

        .auth-title{
            font-weight:600;
            margin-bottom:25px;
        }

        .form-control{
            height:45px;
            border-radius:8px;
        }

        .btn-green{
            background:#20c05c;
            border:none;
            height:45px;
            font-weight:500;
            border-radius:8px;
        }

        .btn-green:hover{
            background:#169a49;
        }

        .auth-link{
            color:#20c05c;
            text-decoration:none;
            font-weight:500;
        }

        .auth-link:hover{
            text-decoration:underline;
        }

    </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark px-4">
    <a class="navbar-brand fw-bold" href="#">
        SHADOW <span style="color:#20c05c;">FIT</span>
    </a>
    <div class="ms-auto">
        {% if request.user.is_authenticated %}
            <a href="{% url 'dashboard' %}" class="btn btn-outline-light me-2">Dashboard</a>
            <a href="{% url 'logout' %}" class="btn btn-green">Logout</a>
        {% else %}
            <a href="{% url 'login' %}" class="btn btn-outline-light me-2">Login</a>
            <a href="{% url 'register' %}" class="btn btn-green">Register</a>
        {% endif %}
    </div>
</nav>

{% block content %}{% endblock %}

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
