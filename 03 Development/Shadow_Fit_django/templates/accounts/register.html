{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Register | Shadow Fit</title>
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
</head>
<body>
    <div class="auth-page">
        <div class="auth-card">
            <a href="{% url 'client_dashboard' %}" class="logo" style="text-decoration:none;">
                <span class="shadow">Shadow</span>
                <span class="fit">Fit</span>
            </a>

            <h2 class="auth-title">Sign Up</h2>
            {% if messages %}
            {% for message in messages %}
            <div class="alert">
                {{ message }}
            </div>
            {% endfor %}
            {% endif %}

            <form method="POST" enctype="multipart/form-data">
                {% csrf_token %}
                <div class="form-group">
                    <label>First Name</label>
                    <input type="text" name="first_name" required>
                </div>
                <div class="form-group">
                    <label>Last Name</label>
                    <input type="text" name="last_name" required>
                </div>
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" name="username" required>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" name="email" required>
                </div>
                <div class="form-group">
                    <label>Phone Number <span style="color:#999; font-size:12px;"></span></label>
                    <input type="text" name="phone" placeholder="98XXXXXXXX" required>
                </div>
                <div class="form-group">
                    <label>Profile Photo <span style="color:#999; font-size:12px;">(Optional)</span></label>
                    <input type="file" name="photo" accept="image/*">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="password1" required>
                </div>
                <div class="form-group">
                    <label>Confirm Password</label>
                    <input type="password" name="password2" required>
                </div>
                <button class="form-btn" type="submit">
                    Create Account
                </button>
            </form>

            <div class="auth-footer">
                Already have an account?
                <a href="{% url 'login' %}">Login</a>
            </div>
            
            <!--  "Back to Home" link below the logo: -->
            <div style="text-align:center; margin-bottom: 16px;">
                <a href="{% url 'client_dashboard' %}"
                    style="font-size:13px; color:#888; text-decoration:none;">
                    <i class="bi bi-arrow-left"></i> Back to Home
                </a>
            </div>
        </div>
    </div>
</body>
</html>
