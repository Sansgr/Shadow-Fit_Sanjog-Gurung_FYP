{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Register | Shadow Fit</title>
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body>
    <div class="auth-page">
        <div class="auth-card">
            <div style="text-align:center; margin-bottom:10px;">
                <a href="{% url 'client_dashboard' %}"
                    style="font-size:30px; font-weight:700;
                        font-family:'Montserrat',sans-serif; text-decoration:none;">
                    <span style="color:#000;">Shadow</span>
                    <span style="color:#20c05c;">Fit</span>
                </a>
            </div>

            <h2 class="auth-title">Sign Up</h2>

            {% if messages %}
                {% for message in messages %}
                <div class="alert">{{ message }}</div>
                {% endfor %}
            {% endif %}

            <form method="POST" enctype="multipart/form-data">
                {% csrf_token %}
                <div class="form-group">
                    <label>First Name</label>
                    <input type="text" name="first_name"
                        placeholder="Enter your first name" required>
                </div>
                <div class="form-group">
                    <label>Last Name</label>
                    <input type="text" name="last_name"
                        placeholder="Enter your last name" required>
                </div>
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" name="username"
                        placeholder="Choose a username" required>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" name="email"
                        placeholder="your@email.com" required>
                </div>
                <div class="form-group">
                    <label>
                        Phone Number
                        <span style="color:#999; font-size:12px;">(Optional)</span>
                    </label>
                    <input type="text" name="phone" placeholder="98XXXXXXXX">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="password1"
                        placeholder="Create a strong password" required>
                </div>
                <div class="form-group">
                    <label>Confirm Password</label>
                    <input type="password" name="password2"
                        placeholder="Re-enter your password" required>
                </div>
                <div class="form-group">
                    <label>
                        Profile Photo
                        <span style="color:#999; font-size:12px;">(Optional)</span>
                    </label>
                    <input type="file" name="photo" accept="image/*">
                </div>
                <button class="form-btn" type="submit">
                    Create Account
                </button>
            </form>

            <div class="auth-footer">
                Already have an account?
                <a href="{% url 'login' %}">Login</a>
            </div>

            <div style="text-align:center; margin-top:16px;">
                <a href="{% url 'client_dashboard' %}"
                    style="font-size:13px; color:#888; text-decoration:none;">
                    <i class="bi bi-arrow-left"></i> Back to Home
                </a>
            </div>
        </div>
    </div>
</body>
</html>
