{% extends "base.html" %}

{% block content %}

<div class="container mt-5">

    <h2 class="mb-4">Welcome to Shadow Fit</h2>

    {% if request.user.is_authenticated %}

        <p>Hello {{request.user.first_name}}! Ready to train?</p>

    {% else %}

        <p>Join Shadow Fit today to access gym membership and trainer booking.</p>

    {% endif %}

</div>

{% endblock %}
